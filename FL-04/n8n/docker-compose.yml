# Self-hosted n8n for the FL-04 source-grounded-notes pipeline.
#   docker compose up -d   ->   http://localhost:5678
# On the VPS, put it behind traefik like the other services.
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false          # local http; drop behind TLS on the VPS
      - GENERIC_TIMEZONE=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data:
